# =============================================================================
# BeanMind Docker Compose 配置
# 单机部署：前后端一体镜像，数据与日志挂载到宿主机
# =============================================================================

services:
  beanmind:
    image: pionnerwang/beanmind:latest
    container_name: beanmind
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # 数据持久化（Beancount 账本 + SQLite）
      - ./data:/home/app/project/data
      # 日志持久化
      - ./logs:/home/app/project/logs
    environment:
      # 容器内绝对路径（覆盖 .env 中的相对路径）
      - DATA_DIR=/home/app/project/data
      - LEDGER_FILE=/home/app/project/data/ledger/main.beancount
      - DATABASE_FILE=/home/app/project/data/beanmind.db
      - LOG_DIR=/home/app/project/logs
      # 周期记账调度
      - SCHEDULER_ENABLED=${SCHEDULER_ENABLED:-true}
      - SCHEDULER_HOUR=${SCHEDULER_HOUR:-12}
      - SCHEDULER_MINUTE=${SCHEDULER_MINUTE:-0}
      - SCHEDULER_TIMEZONE=${SCHEDULER_TIMEZONE:-Asia/Shanghai}
      # 可选 LLM（月度复盘，默认关闭）
      - LLM_ENABLED=${LLM_ENABLED:-false}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - LLM_TIMEOUT_SECONDS=${LLM_TIMEOUT_SECONDS:-30}
      # 服务
      - DEBUG=${DEBUG:-false}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
